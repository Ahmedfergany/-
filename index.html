<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>المدرسة الربانية - الإصدار المتكامل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root {
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --amber:#B5710A;--amber-light:#FAEEDA;
  --purple:#7F77DD;--purple-light:#EEEDFE;
  --red:#A32D2D;--red-light:#FCEBEB;
  --orange:#c0570a;--orange-light:#fff3e6;
  --tg:#229ED9;
  --bg:#F5F3EE;--card:#FFFFFF;
  --border:rgba(0,0,0,0.07);--text:#1a1a1a;--muted:#888;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:5rem;}
.header{background:var(--green-dark);color:#fff;padding:1rem 1rem 0.8rem;text-align:center;position:relative;}
.header h1{font-size:20px;font-weight:700;}
.header .sub{font-size:12px;opacity:.7;margin-top:3px;display:flex;justify-content:center;gap:12px;}
.lang-switch{position:absolute;left:12px;top:12px;background:rgba(255,255,255,0.2);border:none;color:#fff;padding:4px 10px;border-radius:20px;font-size:12px;cursor:pointer;}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--green-dark);display:flex;border-top:1px solid rgba(255,255,255,0.12);z-index:100;}
.tab-btn{flex:1;padding:8px 4px 10px;background:none;border:none;color:rgba(255,255,255,0.5);font-size:11px;font-family:'Tajawal',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-top:2.5px solid transparent;transition:all .15s;}
.tab-btn.active{color:#fff;border-top-color:#fff;}
.tab-btn svg{width:20px;height:20px;}
.page{display:none;}
.page.active{display:block;}
.score-bar{background:var(--green);padding:10px 1rem;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.score-text{color:#fff;font-size:13px;white-space:nowrap;}
.pct{color:#fff;font-size:17px;font-weight:700;white-space:nowrap;}
.prog-out{height:6px;background:rgba(255,255,255,.3);border-radius:3px;flex:1;overflow:hidden;}
.prog-in{height:100%;background:#fff;border-radius:3px;transition:width .4s;}
.prayer-bar{background:var(--blue);padding:8px 1rem;overflow-x:auto;scrollbar-width:none;}
.prayer-bar::-webkit-scrollbar{display:none;}
.prayer-times{display:flex;gap:6px;min-width:max-content;}
.pt{display:flex;flex-direction:column;align-items:center;background:rgba(255,255,255,.12);border-radius:10px;padding:5px 10px;min-width:64px;}
.pt.active{background:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.5);}
.pt-name{font-size:11px;color:rgba(255,255,255,.8);}
.pt-time{font-size:14px;font-weight:700;color:#fff;margin-top:2px;direction:ltr;}
.pt-dot{width:5px;height:5px;border-radius:50%;background:#fff;margin-top:4px;opacity:0;}
.pt.active .pt-dot{opacity:1;}
.pt-next{font-size:9px;color:rgba(255,255,255,.7);margin-top:1px;}
.prayer-city{font-size:11px;color:rgba(255,255,255,.7);text-align:center;padding:4px 0 0;}
.notif-btn{display:block;width:calc(100% - 2rem);margin:8px 1rem 0;padding:7px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:10px;color:#fff;font-size:12px;font-family:'Tajawal',sans-serif;cursor:pointer;text-align:center;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:1rem;}
.stat{background:var(--card);border-radius:12px;padding:10px;text-align:center;border:.5px solid var(--border);}
.stat-n{font-size:20px;font-weight:700;}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px;}
.sections{padding:0 1rem;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--card);border-radius:14px;overflow:hidden;border:.5px solid var(--border);}
.card-header{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:.5px solid var(--border);}
.card-title{font-size:15px;font-weight:700;}
.card-pts{font-size:12px;color:var(--muted);background:var(--bg);padding:2px 10px;border-radius:20px;}
.item{border-bottom:.5px solid var(--border);}
.item:last-child{border-bottom:none;}
.item-main{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;transition:background .12s;gap:8px;}
.item-main:hover{background:#fafaf8;}
.item.done .item-main{background:var(--green-light);}
.item.qada .item-main{background:var(--orange-light);}
.item-right{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.item-name{font-size:14px;flex:1;}
.pts-badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.circle{width:24px;height:24px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.item.done .circle{background:var(--green);border-color:var(--green);}
.item.qada .circle{background:var(--orange);border-color:var(--orange);}
.tick{display:none;width:10px;height:6px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);}
.item.done .tick,.item.qada .tick{display:block;}
.qada-row{display:none;padding:6px 14px 8px;background:var(--orange-light);border-top:.5px dashed rgba(192,87,10,.2);}
.item.done .qada-row,.item.qada .qada-row{display:flex;align-items:center;justify-content:space-between;}
.comment-btn{background:none;border:none;font-size:14px;cursor:pointer;color:var(--muted);padding:0 5px;}
.comment-popup{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.5);z-index:200;justify-content:center;align-items:center;height:100%;}
.comment-popup.active{display:flex;}
.comment-card{background:#fff;width:90%;max-width:350px;border-radius:24px;padding:20px;text-align:center;}
.comment-card textarea{width:100%;padding:10px;border-radius:12px;border:1px solid #ddd;margin:12px 0;font-family:'Tajawal',sans-serif;min-height:80px;}
.comment-card button{padding:8px 16px;background:var(--green);color:#fff;border:none;border-radius:30px;margin:5px;}
.cat-bar{height:4px;background:#eee;}
.cat-bar-fill{height:100%;transition:width .4s;}
.bottom{padding:1rem;display:flex;flex-direction:column;gap:10px;}
.input-card{background:var(--card);border-radius:14px;padding:14px;border:.5px solid var(--border);display:flex;flex-direction:column;gap:10px;}
.input-card input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:10px;}
.tg-btn{width:100%;padding:14px;background:var(--tg);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;}
.share-img-btn{background:var(--purple);margin-top:5px;}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 16px;border-radius:40px;font-size:12px;z-index:300;opacity:0;transition:0.2s;}
.ath-header{background:linear-gradient(135deg,#0F6E56,#1D9E75);padding:14px 1rem 10px;display:flex;align-items:center;justify-content:space-between;}
.ath-reset-all{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:12px;padding:5px 12px;border-radius:20px;cursor:pointer;}
.ath-cats{display:flex;gap:6px;padding:10px 1rem;overflow-x:auto;background:var(--card);border-bottom:.5px solid var(--border);}
.ath-cat-btn{padding:5px 14px;border-radius:20px;border:.5px solid var(--border);background:var(--bg);font-size:12px;cursor:pointer;white-space:nowrap;}
.ath-cat-btn.active{background:var(--green-dark);color:#fff;}
.ath-list{padding:.75rem 1rem;display:flex;flex-direction:column;gap:12px;max-height:65vh;overflow-y:auto;}
.ath-card{background:var(--card);border-radius:18px;overflow:hidden;border:.5px solid var(--border);}
.ath-card.done-card{border-color:var(--green);}
.ath-top{padding:14px 16px 10px;}
.ath-text{font-size:17px;font-weight:700;line-height:1.7;text-align:center;}
.ath-trans{font-size:12px;color:var(--muted);text-align:center;margin-top:6px;}
.ath-source{font-size:11px;color:var(--green-dark);text-align:center;margin-top:4px;}
.ath-controls{padding:10px 14px 14px;display:flex;align-items:center;gap:10px;}
.ath-minus{width:38px;height:38px;border-radius:50%;background:var(--red-light);color:var(--red);border:none;font-size:20px;cursor:pointer;}
.ath-counter-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.ath-ring{position:relative;width:70px;height:70px;cursor:pointer;}
.ath-ring svg{width:70px;height:70px;transform:rotate(-90deg);}
.ath-ring-bg{fill:none;stroke:#eee;stroke-width:5;}
.ath-ring-fill{fill:none;stroke:var(--green);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .3s;}
.ath-count-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:20px;font-weight:700;}
.ath-target{font-size:11px;color:var(--muted);}
.ath-plus{width:52px;height:52px;border-radius:50%;background:var(--green);color:#fff;border:none;font-size:26px;cursor:pointer;}
.ath-done-badge{display:none;align-items:center;gap:6px;background:var(--green-light);color:var(--green-dark);font-size:13px;font-weight:700;padding:6px 14px;justify-content:center;}
.ath-card.done-card .ath-done-badge{display:flex;}
.ath-progress-bar{height:3px;background:#eee;}
.ath-progress-fill{height:100%;background:var(--green);transition:width .3s;}
.audio-library{background:var(--card);border-radius:20px;margin:12px;padding:12px;}
.audio-item{display:flex;align-items:center;gap:12px;padding:10px;border-bottom:1px solid var(--border);}
.audio-play{background:var(--purple);border:none;width:44px;height:44px;border-radius:50%;color:#fff;cursor:pointer;}
.lec-list{padding:1rem;}
</style>
</head>
<body>
<div class="header">
  <button class="lang-switch" id="langSwitch" onclick="toggleLanguage()">🇬🇧 English</button>
  <h1 id="page-title">المدرسة الربانية</h1>
  <div class="sub" id="date-label"></div>
</div>

<div id="page-wird" class="page active">
  <div class="score-bar"><span class="score-text" id="score-text">0 / 0</span><div class="prog-out"><div class="prog-in" id="main-bar"></div></div><span class="pct" id="pct-label">0%</span></div>
  <div class="prayer-bar" id="prayer-bar">جاري تحميل الأوقات...</div>
  <button class="notif-btn" onclick="requestNotification()">🔔 تفعيل تذكيرات الأذان</button>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-got">0</div><div class="stat-l">نقاطك</div></div>
    <div class="stat"><div class="stat-n" id="s-max">0</div><div class="stat-l">الكل</div></div>
    <div class="stat"><div class="stat-n" id="s-streak">🔥0</div><div class="stat-l">متتالية</div></div>
    <div class="stat"><div class="stat-n" id="weekly-badge">🏅</div><div class="stat-l">تحدي الأسبوع</div></div>
  </div>
  <div class="sections" id="sections"></div>
  <div class="bottom" id="bottom"></div>
</div>

<div id="page-athkar" class="page">
  <div class="ath-header"><span>📿 الأذكار اليومية</span><button class="ath-reset-all" onclick="resetAllAthkar()">إعادة الكل</button></div>
  <div class="ath-cats" id="ath-cats"></div>
  <div class="ath-list" id="ath-list"></div>
</div>

<div id="page-lectures" class="page"><div class="lec-list">📘 سيتم إضافة المحاضرات من قبل الشيخ قريباً</div></div>
<div id="page-admin" class="page"><div class="admin-wrap" style="padding:1rem">🔐 لوحة الشيخ (محمية)</div></div>

<div id="page-audio" class="page">
  <div class="ath-header" style="background:linear-gradient(135deg,#534AB7,#7F77DD);"><span>🎧 المكتبة الصوتية</span><span>تلاوات وأدعية</span></div>
  <div id="audio-library-container" class="audio-library"></div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showPage('wird')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><span>الورد</span></button>
  <button class="tab-btn" onclick="showPage('athkar')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2a10 10 0 0 1 0 20"/><path d="M12 2a10 10 0 0 0 0 20"/><path d="M2 12h20"/></svg><span>الأذكار</span></button>
  <button class="tab-btn" onclick="showPage('lectures')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/></svg><span>المحاضرات</span></button>
  <button class="tab-btn" onclick="showPage('audio')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg><span>صوتيات</span></button>
  <button class="tab-btn" onclick="showPage('admin')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>الشيخ</span></button>
</div>

<div id="toastMsg" class="toast"></div>
<div id="commentPopup" class="comment-popup"><div class="comment-card"><h4>📝 تعليق على البند</h4><textarea id="commentText" placeholder="سبب عدم الإنجاز أو ملاحظة..."></textarea><button onclick="saveComment()">حفظ</button><button onclick="closeCommentPopup()">إلغاء</button></div></div>

<script>
// ----------------------------------- البيانات الأساسية -----------------------------------
const SECTIONS = ['الكل', 'الفقه', 'السيرة', 'التزكية'];
const DATA = [
  {id:'fajr',title:'الفجر',color:'#185FA5',items:[{id:'fajr_salah',name:'صلاة الفجر جماعة',pts:5,isSalah:true},{id:'fajr_athkar',name:'أذكار الصباح',pts:1}]},
  {id:'duhr',title:'الظهر',color:'#1D9E75',items:[{id:'duhr_salah',name:'صلاة الظهر جماعة',pts:5,isSalah:true}]},
  {id:'asr',title:'العصر',color:'#B5710A',items:[{id:'asr_salah',name:'صلاة العصر جماعة',pts:5,isSalah:true}]},
  {id:'maghrib',title:'المغرب',color:'#7F77DD',items:[{id:'mgh_salah',name:'صلاة المغرب جماعة',pts:5,isSalah:true}]},
  {id:'isha',title:'العشاء',color:'#A32D2D',items:[{id:'isha_salah',name:'صلاة العشاء جماعة',pts:5,isSalah:true},{id:'isha_athkar',name:'أذكار المساء',pts:1}]},
  {id:'extra',title:'النوافل',color:'#0F6E56',items:[{id:'qiyam',name:'قيام الليل',pts:2},{id:'quran',name:'ورد قرآن',pts:1}]}
];
// قائمة الأذكار الكاملة (مصغرة ولكن متنوعة)
const ATHKAR = [
  {id:'a1',cat:'صباح',short:'آية الكرسي',trans:'حفظ من الشيطان',source:'البخاري',target:1},
  {id:'a2',cat:'صباح',short:'سبحان الله وبحمده',trans:'100 مرة',source:'مسلم',target:100},
  {id:'a3',cat:'مساء',short:'المعوذات',trans:'3 مرات',source:'أبو داود',target:3},
  {id:'a4',cat:'تسبيح',short:'سبحان الله',trans:'33 مرة',source:'مسلم',target:33},
  {id:'a5',cat:'تسبيح',short:'الحمد لله',trans:'33 مرة',source:'مسلم',target:33},
  {id:'a6',cat:'استغفار',short:'أستغفر الله',trans:'100 مرة',source:'مسلم',target:100},
  {id:'a7',cat:'نوم',short:'آية الكرسي قبل النوم',trans:'مرة',source:'البخاري',target:1}
];
const ATH_CATS = ['الكل', 'صباح', 'مساء', 'تسبيح', 'استغفار', 'نوم'];

// ------------------- دوال مساعدة -------------------
function load(key, def) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; } }
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function todayKey() { const d = new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }
function todayLabel() { return new Date().toLocaleDateString('ar-EG', { weekday:'long', year:'numeric', month:'long', day:'numeric' }); }
function fmt(n) { return Math.round(n * 10) / 10; }

let currentLang = 'ar';
function toggleLanguage() { currentLang = currentLang === 'ar' ? 'en' : 'ar'; renderWird(); renderAthkar(); }
function showToast(msg) { const t = document.getElementById('toastMsg'); t.textContent = msg; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2000); }

// ------------------- الورد اليومي والمحاسبة -------------------
let state = load('wird_state', {});
let history = load('wird_history', []);
let comments = load('wird_comments', {});
const TK = todayKey();
if (!state[TK]) state[TK] = {};

function maxPoints() { let sum = 0; DATA.forEach(cat => cat.items.forEach(it => sum += it.pts)); return sum; }
function currentPoints() { let sum = 0; DATA.forEach(cat => cat.items.forEach(it => { const s = state[TK][it.id]; if (s === 'done') sum += it.pts; else if (s === 'qada') sum += it.pts / 2; })); return sum; }
function catPoints(cat) { let got = 0, max = 0; cat.items.forEach(it => { max += it.pts; const s = state[TK][it.id]; if (s === 'done') got += it.pts; else if (s === 'qada') got += it.pts / 2; }); return { got, max }; }
function calcStreak() { let s = 0; for (let i = 0; i < history.length; i++) { if (history[i].percent >= 80) s++; else break; } return s; }
function weeklyMedal() { const last7 = history.slice(0, 7); if (last7.length < 7) return false; return last7.every(d => d.percent >= 80); }

function toggleItem(id) { const cur = state[TK][id]; state[TK][id] = cur ? null : 'done'; save('wird_state', state); renderWird(); checkAchievements(); }
function toggleQada(id, checked) { state[TK][id] = checked ? 'qada' : 'done'; save('wird_state', state); renderWird(); checkAchievements(); }
function openComment(itemId) { window.currentCommentId = itemId; const key = `${TK}_${itemId}`; document.getElementById('commentText').value = comments[key] || ''; document.getElementById('commentPopup').classList.add('active'); }
function closeCommentPopup() { document.getElementById('commentPopup').classList.remove('active'); }
function saveComment() { if (window.currentCommentId) { const key = `${TK}_${window.currentCommentId}`; comments[key] = document.getElementById('commentText').value; save('wird_comments', comments); closeCommentPopup(); renderWird(); } }
function checkAchievements() { const streak = calcStreak(); if (streak === 5) showToast('🎉 ماشاء الله! 5 أيام متتالية بنسبة 80%'); if (streak === 7) showToast('🏅 أسبوع كامل من الالتزام!'); }

function renderWird() {
  const got = currentPoints(), maxP = maxPoints(), pct = Math.round(got / maxP * 100);
  document.getElementById('score-text').innerHTML = `${fmt(got)} / ${maxP}`;
  document.getElementById('main-bar').style.width = pct + '%';
  document.getElementById('pct-label').innerHTML = pct + '%';
  document.getElementById('s-got').innerHTML = fmt(got);
  document.getElementById('s-max').innerHTML = maxP;
  document.getElementById('s-streak').innerHTML = `🔥${calcStreak()}`;
  document.getElementById('weekly-badge').innerHTML = weeklyMedal() ? '🏅 وسام' : '⏳';
  document.getElementById('date-label').innerHTML = `<span>${todayLabel()}</span><span id="hijriSpan" style="background:rgba(255,255,255,0.2);padding:0 8px;border-radius:16px;"></span>`;
  fetchHijri();

  let html = '';
  DATA.forEach(cat => {
    const { got: catGot, max: catMax } = catPoints(cat);
    const catPercent = catMax ? Math.round(catGot / catMax * 100) : 0;
    html += `<div class="card"><div class="card-header"><span class="card-title">${cat.title}</span><span class="card-pts">${fmt(catGot)}/${catMax}</span></div>`;
    cat.items.forEach(it => {
      const s = state[TK][it.id];
      const isDone = s === 'done', isQada = s === 'qada';
      const hasComment = comments[`${TK}_${it.id}`] ? '💬' : '';
      html += `<div class="item ${isDone ? 'done' : isQada ? 'qada' : ''}">
        <div class="item-main" onclick="toggleItem('${it.id}')">
          <div class="item-right"><span class="item-name">${it.name} ${hasComment}</span><span class="pts-badge">${isQada ? fmt(it.pts/2) : it.pts}</span></div>
          <div class="circle"><div class="tick"></div></div>
        </div>
        ${(it.isSalah) ? `<div class="qada-row"><label class="qada-toggle"><input type="checkbox" ${isQada ? 'checked' : ''} onchange="toggleQada('${it.id}',this.checked)"/><span>قضاء (نصف)</span></label><button class="comment-btn" onclick="event.stopPropagation();openComment('${it.id}')">📝</button></div>` : `<div style="padding:5px 14px 8px;"><button class="comment-btn" onclick="event.stopPropagation();openComment('${it.id}')">📝 تعليق</button></div>`}
      </div>`;
    });
    html += `<div class="cat-bar"><div class="cat-bar-fill" style="width:${catPercent}%;background:${cat.color}"></div></div></div>`;
  });
  document.getElementById('sections').innerHTML = html;
  document.getElementById('bottom').innerHTML = `<div class="input-card"><input type="text" id="userName" placeholder="اسمك" value="${load('user_name','')}" oninput="save('user_name',this.value)"/><button class="tg-btn" onclick="sendReport()">📤 إرسال التقرير للشيخ</button><button class="tg-btn share-img-btn" onclick="shareAsImage()">📸 مشاركة كصورة</button></div>`;
}

async function fetchHijri() { try { const res = await fetch(`https://api.aladhan.com/v1/gToH/${new Date().getDate()}-${new Date().getMonth()+1}-${new Date().getFullYear()}`); const data = await res.json(); if (data.code === 200) document.getElementById('hijriSpan').innerHTML = `🕌 ${data.data.hijri.day} ${data.data.hijri.month.ar} ${data.data.hijri.year}`; } catch(e) {} }
function sendReport() { const phone = load('sheikh_phone', '201158313603').replace(/\D/g,''); const msg = `تقرير الورد: ${fmt(currentPoints())}/${maxPoints()} نقطة - ${todayLabel()}`; window.open(`https://t.me/+${phone}?text=${encodeURIComponent(msg)}`,'_blank'); }
async function shareAsImage() { const el = document.querySelector('.sections'); if (!el) return; const canvas = await html2canvas(el, { scale: 2 }); const link = document.createElement('a'); link.download = 'ward_report.png'; link.href = canvas.toDataURL(); link.click(); showToast('تم حفظ الصورة'); }

// ------------------- الأذكار -------------------
let athkarCounts = load('athkar_counts', {});
function getAthkarCount(id) { return athkarCounts[id] || 0; }
function isAthkarDone(id) { const a = ATHKAR.find(x => x.id === id); return a && getAthkarCount(id) >= a.target; }
function incAthkar(id) { const a = ATHKAR.find(x => x.id === id); if (a && getAthkarCount(id) < a.target) { athkarCounts[id] = (athkarCounts[id] || 0) + 1; save('athkar_counts', athkarCounts); renderAthkar(); } }
function decAthkar(id) { if (getAthkarCount(id) > 0) { athkarCounts[id]--; save('athkar_counts', athkarCounts); renderAthkar(); } }
function resetAllAthkar() { athkarCounts = {}; save('athkar_counts', athkarCounts); renderAthkar(); }
let activeCat = 'الكل';
function setAthCat(cat) { activeCat = cat; renderAthkar(); }
function renderAthkar() {
  const catsHtml = ATH_CATS.map(c => `<button class="ath-cat-btn ${activeCat === c ? 'active' : ''}" onclick="setAthCat('${c}')">${c}</button>`).join('');
  document.getElementById('ath-cats').innerHTML = catsHtml;
  const filtered = activeCat === 'الكل' ? ATHKAR : ATHKAR.filter(a => a.cat === activeCat);
  const circ = 2 * Math.PI * 30;
  const listHtml = filtered.map(a => {
    const cnt = getAthkarCount(a.id), done = cnt >= a.target, pct = Math.min(cnt / a.target, 1);
    const offset = circ * (1 - pct);
    return `<div class="ath-card ${done ? 'done-card' : ''}" id="ath-card-${a.id}">
      <div class="ath-top"><div class="ath-text">${a.short}</div><div class="ath-trans">${a.trans}</div><div class="ath-source">📖 ${a.source}</div></div>
      <div class="ath-progress-bar"><div class="ath-progress-fill" style="width:${pct*100}%"></div></div>
      <div class="ath-controls">
        <button class="ath-minus" onclick="decAthkar('${a.id}')">−</button>
        <div class="ath-counter-wrap"><div class="ath-ring" onclick="incAthkar('${a.id}')"><svg viewBox="0 0 70 70"><circle class="ath-ring-bg" cx="35" cy="35" r="30"/><circle class="ath-ring-fill" cx="35" cy="35" r="30" style="stroke-dasharray:${circ};stroke-dashoffset:${offset}"/></svg><span class="ath-count-num">${cnt}</span></div><span class="ath-target">من ${a.target}</span></div>
        <button class="ath-plus" onclick="incAthkar('${a.id}')">+</button>
      </div>
      <div class="ath-done-badge">✅ اكتمل! بارك الله فيك</div>
    </div>`;
  }).join('');
  document.getElementById('ath-list').innerHTML = listHtml;
}

// ------------------- أوقات الصلاة والإشعارات -------------------
let prayerTimes = null;
async function fetchPrayerTimes(city) {
  city = city || load('user_city', 'Cairo');
  try {
    const d = new Date(), dd = String(d.getDate()).padStart(2,'0'), mm = String(d.getMonth()+1).padStart(2,'0'), yy = d.getFullYear();
    const res = await fetch(`https://api.aladhan.com/v1/timingsByCity/${dd}-${mm}-${yy}?city=${encodeURIComponent(city)}&country=EG&method=5`);
    const json = await res.json();
    if (json.code === 200) {
      prayerTimes = json.data.timings;
      save('user_city', city);
      renderPrayers(city);
      scheduleNotifications();
    } else throw new Error();
  } catch(e) { document.getElementById('prayer-bar').innerHTML = '<div>⚠️ تعذر تحميل الأوقات، تأكد من اتصالك بالإنترنت</div>'; }
}
function renderPrayers(city) {
  if (!prayerTimes) return;
  const now = new Date(), nowMin = now.getHours()*60 + now.getMinutes();
  const keys = ['Fajr','Dhuhr','Asr','Maghrib','Isha'];
  const names = {Fajr:'الفجر', Dhuhr:'الظهر', Asr:'العصر', Maghrib:'المغرب', Isha:'العشاء'};
  const mins = keys.map(k => { const [h,m] = prayerTimes[k].split(':').map(Number); return h*60+m; });
  let nextIdx = -1; for (let i=0; i<mins.length; i++) if (mins[i] > nowMin) { nextIdx = i; break; }
  const html = keys.map((k,i) => {
    const isActive = i === nextIdx;
    let nextText = '';
    if (isActive) { const diff = mins[i] - nowMin; const hr = Math.floor(diff/60), mn = diff%60; nextText = hr>0 ? `بعد ${hr}س ${mn}د` : `بعد ${mn}د`; }
    return `<div class="pt ${isActive ? 'active' : ''}"><span class="pt-name">${names[k]}</span><span class="pt-time">${prayerTimes[k].replace(/\s*(AM|PM)/i,'')}</span><div class="pt-dot"></div>${isActive ? `<span class="pt-next">${nextText}</span>` : ''}</div>`;
  }).join('');
  document.getElementById('prayer-bar').innerHTML = `<div class="prayer-times">${html}</div><div class="prayer-city">📍 ${city}</div>`;
}
let notifTimers = [];
function scheduleNotifications() {
  if (Notification.permission !== 'granted') return;
  notifTimers.forEach(clearTimeout);
  const now = new Date();
  ['Fajr','Dhuhr','Asr','Maghrib','Isha'].forEach(k => {
    const [h,m] = prayerTimes[k].split(':').map(Number);
    const time = new Date(now); time.setHours(h,m,0,0);
    const diff = time - now;
    if (diff > 0 && diff < 86400000) {
      const timer = setTimeout(() => new Notification(`🕌 حان وقت ${k === 'Fajr' ? 'الفجر' : k === 'Dhuhr' ? 'الظهر' : k === 'Asr' ? 'العصر' : k === 'Maghrib' ? 'المغرب' : 'العشاء'}`, { body: 'لا تنسَ الصلاة والأذكار' }), diff);
      notifTimers.push(timer);
    }
  });
}
async function requestNotification() {
  const perm = await Notification.requestPermission();
  if (perm === 'granted') { showToast('🔔 سيتم تذكيرك بالأذان'); scheduleNotifications(); }
  else showToast('❌ لم يتم السماح بالإشعارات');
}

// ------------------- المكتبة الصوتية -------------------
const audioTracks = [
  { name: "سورة الفاتحة - مشاري العفاسي", url: "https://server7.mp3quran.net/afsasy/001.mp3" },
  { name: "آية الكرسي - عبد الباسط", url: "https://server7.mp3quran.net/basit/255.mp3" },
  { name: "أذكار الصباح - مشاري", url: "https://archive.org/download/azkar_sabah/azkar_sabah.mp3" },
  { name: "دعاء القنوت - وديع اليمني", url: "https://ia801609.us.archive.org/4/items/dua_qunoot/dua_qunoot.mp3" }
];
let currentAudio = null;
function playAudioTrack(url, btn) {
  if (currentAudio && !currentAudio.paused) { currentAudio.pause(); currentAudio = null; document.querySelectorAll('.audio-play').forEach(b => b.innerHTML = '▶️'); }
  const audio = new Audio(url);
  audio.play().catch(e => { showToast('⚠️ تعذر تشغيل الصوت، قد يكون الرابط غير آمن'); });
  currentAudio = audio;
  btn.innerHTML = '⏸️';
  audio.onended = () => { btn.innerHTML = '▶️'; currentAudio = null; };
}
function renderAudioLibrary() {
  const container = document.getElementById('audio-library-container');
  if (!container) return;
  container.innerHTML = audioTracks.map((t, i) => `<div class="audio-item"><button class="audio-play" onclick="playAudioTrack('${t.url}', this)">▶️</button><div><strong>${t.name}</strong></div></div>`).join('');
}

// ------------------- تبديل الصفحات -------------------
function showPage(page) {
  ['wird','athkar','lectures','admin','audio'].forEach(p => {
    document.getElementById(`page-${p}`).classList.toggle('active', p === page);
    document.querySelector(`.tab-btn[onclick*="${p}"]`)?.classList.toggle('active', p === page);
  });
  if (page === 'athkar') renderAthkar();
  if (page === 'audio') renderAudioLibrary();
}

// ------------------- التهيئة -------------------
function init() {
  renderWird();
  renderAthkar();
  fetchPrayerTimes(load('user_city', 'Cairo'));
  if (Notification.permission !== 'granted') setTimeout(() => Notification.requestPermission(), 1000);
  setInterval(() => { if (prayerTimes) renderPrayers(load('user_city','Cairo')); }, 60000);
}
window.toggleItem = toggleItem; window.toggleQada = toggleQada; window.openComment = openComment; window.saveComment = saveComment; window.closeCommentPopup = closeCommentPopup;
window.incAthkar = incAthkar; window.decAthkar = decAthkar; window.resetAllAthkar = resetAllAthkar; window.setAthCat = setAthCat;
window.playAudioTrack = playAudioTrack; window.showPage = showPage; window.toggleLanguage = toggleLanguage; window.requestNotification = requestNotification; window.sendReport = sendReport; window.shareAsImage = shareAsImage;
init();
</script>
