<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المدرسة الربانية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --amber:#B5710A;--amber-light:#FAEEDA;
  --purple:#7F77DD;--purple-light:#EEEDFE;
  --red:#A32D2D;--red-light:#FCEBEB;
  --orange:#c0570a;--orange-light:#fff3e6;
  --tg:#229ED9;
  --bg:#F5F3EE;--card:#FFFFFF;
  --border:rgba(0,0,0,0.07);--text:#1a1a1a;--muted:#888;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:5rem;}
.motivation-toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-12px);width:min(calc(100% - 24px),460px);background:linear-gradient(135deg,#0F6E56,#1D9E75);color:#fff;padding:14px 16px;border-radius:16px;box-shadow:0 14px 28px rgba(15,110,86,.22);z-index:300;opacity:0;pointer-events:none;transition:opacity .35s ease,transform .35s ease;}
.motivation-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.motivation-label{font-size:11px;opacity:.78;margin-bottom:4px;}
.motivation-text{font-size:14px;font-weight:700;line-height:1.7;}
.header{background:var(--green-dark);color:#fff;padding:1.25rem 1rem 1rem;text-align:center;}
.header h1{font-size:20px;font-weight:700;}
.header .sub{font-size:13px;opacity:.7;margin-top:3px;}

/* Tab bar */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--green-dark);display:flex;border-top:1px solid rgba(255,255,255,0.12);z-index:100;}
.tab-btn{flex:1;padding:8px 4px 10px;background:none;border:none;color:rgba(255,255,255,0.5);font-size:11px;font-family:'Tajawal',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-top:2.5px solid transparent;transition:all .15s;}
.tab-btn.active{color:#fff;border-top-color:#fff;}
.tab-btn svg{width:20px;height:20px;}
.page{display:none;}
.page.active{display:block;}

/* Wird */
.score-bar{background:var(--green);padding:10px 1rem;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.score-text{color:#fff;font-size:13px;white-space:nowrap;}
.pct{color:#fff;font-size:17px;font-weight:700;white-space:nowrap;}
.prog-out{height:6px;background:rgba(255,255,255,.3);border-radius:3px;flex:1;overflow:hidden;}
.prog-in{height:100%;background:#fff;border-radius:3px;transition:width .4s;}
.prayer-bar{background:var(--blue);padding:8px 1rem;overflow-x:auto;scrollbar-width:none;}
.prayer-bar::-webkit-scrollbar{display:none;}
.prayer-times{display:flex;gap:6px;min-width:max-content;}
.pt{display:flex;flex-direction:column;align-items:center;background:rgba(255,255,255,.12);border-radius:10px;padding:5px 10px;min-width:64px;}
.pt.active{background:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.5);}
.pt-name{font-size:11px;color:rgba(255,255,255,.8);}
.pt-time{font-size:14px;font-weight:700;color:#fff;margin-top:2px;direction:ltr;}
.pt-dot{width:5px;height:5px;border-radius:50%;background:#fff;margin-top:4px;opacity:0;}
.pt.active .pt-dot{opacity:1;}
.pt-next{font-size:9px;color:rgba(255,255,255,.7);margin-top:1px;}
.prayer-city{font-size:11px;color:rgba(255,255,255,.7);text-align:center;padding:4px 0 0;}
.notif-btn{display:block;width:calc(100% - 2rem);margin:8px 1rem 0;padding:7px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:10px;color:#fff;font-size:12px;font-family:'Tajawal',sans-serif;cursor:pointer;text-align:center;}
.notif-btn:hover{background:rgba(255,255,255,.25);}
.notif-status{font-size:11px;color:rgba(255,255,255,.7);text-align:center;padding:3px 0 6px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:1rem;}
.stat{background:var(--card);border-radius:12px;padding:10px;text-align:center;border:.5px solid var(--border);}
.stat-n{font-size:20px;font-weight:700;}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px;}
.sections{padding:0 1rem;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--card);border-radius:14px;overflow:hidden;border:.5px solid var(--border);}
.card-header{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:.5px solid var(--border);}
.card-title{font-size:15px;font-weight:700;}
.card-pts{font-size:12px;color:var(--muted);background:var(--bg);padding:2px 10px;border-radius:20px;}
.item{border-bottom:.5px solid var(--border);}
.item:last-child{border-bottom:none;}
.item-main{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;transition:background .12s;gap:8px;}
.item-main:hover{background:#fafaf8;}
.item.done .item-main{background:var(--green-light);}
.item.qada .item-main{background:var(--orange-light);}
.item-right{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.item-name{font-size:14px;flex:1;}
.item.done .item-name{color:var(--green-dark);font-weight:500;}
.item.qada .item-name{color:var(--orange);font-weight:500;}
.pts-badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.circle{width:24px;height:24px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.item.done .circle{background:var(--green);border-color:var(--green);}
.item.qada .circle{background:var(--orange);border-color:var(--orange);}
.tick{display:none;width:10px;height:6px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);}
.item.done .tick,.item.qada .tick{display:block;}
.qada-row{display:none;padding:6px 14px 8px;background:var(--orange-light);border-top:.5px dashed rgba(192,87,10,.2);}
.item.done .qada-row,.item.qada .qada-row{display:flex;align-items:center;gap:8px;}
.qada-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;}
.qada-toggle input{accent-color:var(--orange);width:16px;height:16px;cursor:pointer;}
.qada-toggle span{font-size:12px;color:var(--orange);}
.cat-bar{height:4px;background:#eee;}
.cat-bar-fill{height:100%;transition:width .4s;}
.bottom{padding:1rem;display:flex;flex-direction:column;gap:10px;}
.input-card{background:var(--card);border-radius:14px;padding:14px;border:.5px solid var(--border);display:flex;flex-direction:column;gap:10px;}
.input-card label{font-size:13px;color:var(--muted);}
.input-card input,.input-card textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);outline:none;resize:none;}
.input-card input:focus,.input-card textarea:focus{border-color:var(--green);}
.input-card textarea{min-height:70px;}
.city-row{display:flex;gap:8px;}
.city-row input{flex:1;}
.city-btn{padding:9px 14px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:13px;font-family:'Tajawal',sans-serif;cursor:pointer;white-space:nowrap;}
.city-btn:hover{background:#0e4d8a;}
.tg-btn{width:100%;padding:14px;background:var(--tg);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s;}
.tg-btn:hover{background:#1a8bc2;}
.tg-btn:active{transform:scale(.98);}
.tg-icon{width:22px;height:22px;fill:#fff;flex-shrink:0;}
.reset-btn{width:100%;padding:11px;background:transparent;color:var(--muted);border:.5px solid var(--border);border-radius:14px;font-size:13px;font-family:'Tajawal',sans-serif;cursor:pointer;}
.reset-btn:hover{background:rgba(0,0,0,.03);}
.history-box{background:var(--card);border-radius:14px;overflow:hidden;border:.5px solid var(--border);}
.history-title{padding:10px 14px;font-size:13px;font-weight:700;color:var(--muted);border-bottom:.5px solid var(--border);}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:.5px solid var(--border);font-size:13px;}
.history-row:last-child{border-bottom:none;}

/* Lectures */
.lec-top{padding:14px 1rem 4px;display:flex;justify-content:space-between;align-items:baseline;}
.lec-top-title{font-size:16px;font-weight:700;color:var(--green-dark);}
.lec-top-sub{font-size:12px;color:var(--muted);}
.lec-list{padding:8px 1rem 1rem;display:flex;flex-direction:column;gap:14px;}
.lec-card{background:var(--card);border-radius:16px;overflow:hidden;border:.5px solid var(--border);}
.lec-head{padding:12px 14px;display:flex;align-items:center;gap:10px;}
.lec-num{width:34px;height:34px;border-radius:50%;background:var(--purple-light);color:var(--purple);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lec-info{flex:1;}
.lec-title{font-size:14px;font-weight:700;}
.lec-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.lec-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.lec-badge.done-all{background:var(--green-light);color:var(--green-dark);}
.lec-badge.partial{background:var(--amber-light);color:var(--amber);}
.lec-badge.empty{background:var(--bg);color:var(--muted);}
.audio-row{border-top:.5px solid var(--border);background:var(--purple-light);padding:11px 14px;display:flex;align-items:center;gap:12px;}
.play-circle{width:42px;height:42px;border-radius:50%;background:var(--purple);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
.play-circle:hover{background:#534AB7;}
.play-circle.playing{background:var(--green-dark);}
.play-circle svg{width:16px;height:16px;fill:#fff;margin-right:-2px;}
.audio-info{flex:1;}
.audio-name{font-size:13px;font-weight:500;color:var(--purple);}
.audio-dur{font-size:11px;color:#9390d8;margin-top:1px;}
.audio-player{width:100%;margin-top:8px;accent-color:var(--purple);}
.drive-frame{width:100%;height:78px;margin-top:8px;border:none;border-radius:12px;background:#fff;}
.open-link-btn{display:inline-flex;align-items:center;gap:5px;margin-top:6px;font-size:12px;color:var(--purple);background:rgba(127,119,221,.13);padding:4px 10px;border-radius:20px;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;}
.open-link-btn:hover{background:rgba(127,119,221,.23);}
.qs-section{border-top:.5px solid var(--border);}
.qs-header{padding:8px 14px;display:flex;justify-content:space-between;background:var(--bg);border-bottom:.5px solid var(--border);}
.qs-label{font-size:12px;font-weight:700;color:var(--muted);}
.qs-prog{font-size:12px;font-weight:700;color:var(--green-dark);}
.q-item{border-bottom:.5px solid var(--border);}
.q-item:last-child{border-bottom:none;}
.q-head{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;cursor:pointer;transition:background .12s;}
.q-head:hover{background:#fafaf8;}
.q-item.answered .q-head{background:var(--green-light);}
.q-num{font-size:11px;font-weight:700;color:var(--muted);min-width:20px;padding-top:2px;}
.q-item.answered .q-num{color:var(--green-dark);}
.q-text{font-size:13px;flex:1;line-height:1.55;}
.q-item.answered .q-text{color:var(--green-dark);font-weight:500;}
.q-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.q-item.answered .q-circle{background:var(--green);border-color:var(--green);}
.q-tick{display:none;width:8px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);}
.q-item.answered .q-tick{display:block;}
.q-answer-box{display:none;padding:0 14px 12px;background:var(--green-light);}
.q-item.answered .q-answer-box{display:block;}
.q-answer-inp{width:100%;padding:8px 10px;border:1px solid rgba(29,158,117,.25);border-radius:10px;font-size:13px;font-family:'Tajawal',sans-serif;background:#fff;color:var(--text);outline:none;resize:none;min-height:65px;}
.q-answer-inp:focus{border-color:var(--green);}
.q-send-btn{margin-top:8px;padding:8px 16px;background:var(--tg);color:#fff;border:none;border-radius:10px;font-size:13px;font-family:'Tajawal',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.q-send-btn:hover{background:#1a8bc2;}

/* Section tabs in lectures */
.sec-tabs{display:flex;gap:6px;padding:8px 1rem 0;overflow-x:auto;scrollbar-width:none;}
.sec-tabs::-webkit-scrollbar{display:none;}
.sec-tab{padding:6px 14px;border-radius:20px;border:.5px solid var(--border);background:var(--card);font-size:12px;font-family:'Tajawal',sans-serif;cursor:pointer;white-space:nowrap;color:var(--muted);}
.sec-tab.active{background:var(--green-dark);color:#fff;border-color:var(--green-dark);}

/* Admin */
.admin-wrap{padding:1rem;display:flex;flex-direction:column;gap:12px;}
.admin-card{background:var(--card);border-radius:14px;padding:14px;border:.5px solid var(--border);display:flex;flex-direction:column;gap:10px;}
.admin-card h3{font-size:14px;font-weight:700;color:var(--purple);}
.admin-card input,.admin-card textarea,.admin-card select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);outline:none;resize:none;}
.admin-card input:focus,.admin-card textarea:focus,.admin-card select:focus{border-color:var(--purple);}
.admin-card textarea{min-height:80px;}
.add-lec-btn{padding:11px;background:var(--purple);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;}
.add-lec-btn:hover{background:#534AB7;}
.export-btn{width:100%;padding:13px;background:var(--green-dark);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.export-btn:hover{background:#085041;}
.lec-admin-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:.5px solid var(--border);}
.lec-admin-row:last-child{border-bottom:none;}
.lec-admin-info{flex:1;}
.lec-admin-title{font-size:13px;font-weight:500;}
.lec-admin-sec{font-size:11px;color:var(--purple);margin-top:2px;}
.lec-admin-qs{font-size:11px;color:var(--muted);margin-top:2px;}
.del-btn{padding:4px 10px;background:var(--red-light);color:var(--red);border:none;border-radius:8px;font-size:12px;font-family:'Tajawal',sans-serif;cursor:pointer;flex-shrink:0;}
.lock-row{display:flex;gap:8px;}
.lock-row input{flex:1;}
.lock-btn{padding:9px 14px;background:var(--green-dark);color:#fff;border:none;border-radius:10px;font-size:13px;font-family:'Tajawal',sans-serif;cursor:pointer;}
.copy-area{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;font-size:11px;font-family:monospace;background:var(--bg);color:var(--text);resize:none;min-height:120px;direction:ltr;}
.copy-btn{padding:9px 14px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:13px;font-family:'Tajawal',sans-serif;cursor:pointer;}
.import-btn{padding:11px;background:var(--amber);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;}
.import-btn:hover{background:#8e5a08;}
.share-link{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;font-size:11px;font-family:monospace;background:var(--bg);color:var(--text);direction:ltr;word-break:break-all;}
.hint{font-size:12px;color:var(--muted);line-height:1.6;}

/* ═══ Athkar Page ═══ */
.ath-header{background:linear-gradient(135deg,#0F6E56,#1D9E75);padding:14px 1rem 10px;display:flex;align-items:center;justify-content:space-between;}
.ath-header-title{color:#fff;font-size:15px;font-weight:700;}
.ath-reset-all{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:12px;font-family:'Tajawal',sans-serif;padding:5px 12px;border-radius:20px;cursor:pointer;}
.ath-cats{display:flex;gap:6px;padding:10px 1rem;overflow-x:auto;scrollbar-width:none;background:var(--card);border-bottom:.5px solid var(--border);}
.ath-cats::-webkit-scrollbar{display:none;}
.ath-cat-btn{padding:5px 14px;border-radius:20px;border:.5px solid var(--border);background:var(--bg);font-size:12px;font-family:'Tajawal',sans-serif;cursor:pointer;white-space:nowrap;color:var(--muted);transition:all .15s;}
.ath-cat-btn.active{background:var(--green-dark);color:#fff;border-color:var(--green-dark);}
.ath-list{padding:.75rem 1rem;display:flex;flex-direction:column;gap:12px;}
.ath-card{background:var(--card);border-radius:18px;overflow:hidden;border:.5px solid var(--border);transition:box-shadow .2s;}
.ath-card.done-card{border-color:var(--green);box-shadow:0 0 0 2px rgba(29,158,117,.15);}
.ath-top{padding:14px 16px 10px;}
.ath-text{font-size:17px;font-weight:700;line-height:1.7;color:var(--text);text-align:center;}
.ath-trans{font-size:12px;color:var(--muted);text-align:center;margin-top:6px;line-height:1.6;}
.ath-source{font-size:11px;color:var(--green-dark);text-align:center;margin-top:4px;font-weight:500;}
.ath-controls{padding:10px 14px 14px;display:flex;align-items:center;gap:10px;}
.ath-minus{width:38px;height:38px;border-radius:50%;background:var(--red-light);color:var(--red);border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;transition:background .15s;}
.ath-minus:hover{background:#f7c1c1;}
.ath-counter-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.ath-ring{position:relative;width:70px;height:70px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.ath-ring svg{width:70px;height:70px;transform:rotate(-90deg);}
.ath-ring-bg{fill:none;stroke:#eee;stroke-width:5;}
.ath-ring-fill{fill:none;stroke:var(--green);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .3s;}
.ath-card.done-card .ath-ring-fill{stroke:var(--green-dark);}
.ath-count-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:20px;font-weight:700;color:var(--green-dark);}
.ath-card.done-card .ath-count-num{color:var(--green-dark);}
.ath-target{font-size:11px;color:var(--muted);}
.ath-plus{width:52px;height:52px;border-radius:50%;background:var(--green);color:#fff;border:none;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;transition:background .15s;box-shadow:0 3px 10px rgba(29,158,117,.35);-webkit-tap-highlight-color:transparent;}
.ath-plus:hover{background:var(--green-dark);}
.ath-plus:active{transform:scale(.93);}
.ath-done-badge{display:none;align-items:center;gap:6px;background:var(--green-light);color:var(--green-dark);font-size:13px;font-weight:700;padding:6px 14px;border-radius:0 0 18px 18px;justify-content:center;}
.ath-card.done-card .ath-done-badge{display:flex;}
.ath-progress-bar{height:3px;background:#eee;}
.ath-progress-fill{height:100%;background:var(--green);transition:width .3s;border-radius:0 2px 2px 0;}
.ath-card.done-card .ath-progress-fill{background:var(--green-dark);}
.ath-summary{display:flex;gap:8px;padding:0 1rem .75rem;flex-wrap:wrap;}
.ath-sum-chip{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:6px 12px;font-size:12px;display:flex;align-items:center;gap:5px;}
.ath-sum-chip.done{background:var(--green-light);border-color:var(--green);color:var(--green-dark);}
</style>
</head>
<body>

<div id="motivation-toast" class="motivation-toast" aria-live="polite">
  <div class="motivation-label">رسالة اليوم</div>
  <div class="motivation-text" id="motivation-text"></div>
</div>

<div class="header">
  <h1 id="page-title">ورد المحاسبة اليومي</h1>
  <div class="sub" id="date-label"></div>
</div>

<!-- Wird -->
<div id="page-wird" class="page active">
  <div class="score-bar">
    <span class="score-text" id="score-text">0 / 0 نقطة</span>
    <div class="prog-out"><div class="prog-in" id="main-bar" style="width:0%"></div></div>

function todayLabel(){

}
function load(k,def){try{const r=localStorage.getItem(k);return r!==null?JSON.parse(r):def;}catch{return def;}}

const PUBLIC_LECTURES_KEY='wird_public_lectures';
function normalizeLecture(raw){
  if(!raw||typeof raw!=='object') return null;
  const title=String(raw.title||'').trim();
  const url=String(raw.url||'').trim();
  if(!title||!url) return null;
  const section=String(raw.section||SECTIONS[0]||'Ø¹Ø§Ù…').trim()||'Ø¹Ø§Ù…';
  const date=String(raw.date||'').trim();
  const duration=String(raw.duration||'').trim();
  const questions=Array.isArray(raw.questions)?raw.questions.map(q=>String(q||'').trim()).filter(Boolean):[];
  const id=String(raw.id||('lec_'+Date.now()+'_'+Math.random().toString(36).slice(2,8))).trim();
  return {id,title,section,url,date,duration,questions};
}
function uniqueLectures(list){
  const map=new Map();
  list.map(normalizeLecture).filter(Boolean).forEach(lec=>map.set(lec.id,lec));
  return [...map.values()];
}
function getPublicLectures(){return uniqueLectures(load(PUBLIC_LECTURES_KEY,[]));}
function savePublicLectures(list){save(PUBLIC_LECTURES_KEY,uniqueLectures(list));}
function getLectures(){return uniqueLectures([...BUILT_IN_LECTURES,...getPublicLectures(),...adminLectures]);}

let audioCtx=null;
function playClick(){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.04,audioCtx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*0.008));
    const src=audioCtx.createBufferSource();
    const gain=audioCtx.createGain();
    gain.gain.setValueAtTime(0.4,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.04);
    src.buffer=buf; src.connect(gain); gain.connect(audioCtx.destination); src.start();
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate(8);
}

function getCount(id){return athkarCounts[id]||0;}
function isDone(id){const a=ATHKAR.find(x=>x.id===id);return a&&getCount(id)>=a.target;}

function incAthkar(id){
  const a=ATHKAR.find(x=>x.id===id);if(!a)return;
  if(getCount(id)<a.target){
    athkarCounts[id]=(athkarCounts[id]||0)+1;
    save('athkar_counts',athkarCounts);
    playClick();
    updateAthkarCard(id);
  }
}
function decAthkar(id){
  if(getCount(id)>0){athkarCounts[id]--;save('athkar_counts',athkarCounts);updateAthkarCard(id);}
}
function resetAthkar(id){athkarCounts[id]=0;save('athkar_counts',athkarCounts);updateAthkarCard(id);}

function updateAthkarCard(id){
  const a=ATHKAR.find(x=>x.id===id);if(!a)return;
  const cnt=getCount(id),done=cnt>=a.target;
  const card=document.getElementById('ath-card-'+id);if(!card)return;
  card.classList.toggle('done-card',done);
  const numEl=card.querySelector('.ath-count-num');if(numEl)numEl.textContent=cnt;
  const pct=Math.min(cnt/a.target,1);
  const circ=2*Math.PI*30,offset=circ*(1-pct);
  const fillEl=card.querySelector('.ath-ring-fill');
  if(fillEl){fillEl.style.strokeDasharray=circ;fillEl.style.strokeDashoffset=offset;}
  const progEl=card.querySelector('.ath-progress-fill');
  if(progEl)progEl.style.width=(pct*100)+'%';
  renderAthSummary();
}

function maxPts(){let t=0;DATA.forEach(c=>c.items.forEach(i=>t+=i.pts));return t;}
function calcPts(){let g=0;DATA.forEach(c=>c.items.forEach(i=>{const s=state[TK][i.id];if(s==='done')g+=i.pts;else if(s==='qada')g+=i.pts/2;}));return g;}
function catPts(cat){let g=0,m=0;cat.items.forEach(i=>{m+=i.pts;const s=state[TK][i.id];if(s==='done')g+=i.pts;else if(s==='qada')g+=i.pts/2;});return{g,m};}
function calcStreak(){const d=load('wird2_history',[]);let s=0;for(let i=0;i<d.length;i++){if(Math.round(d[i].got/d[i].max*100)>=80)s++;else break;}return s;}

const PAR={Fajr:'الفجر',Sunrise:'الشروق',Dhuhr:'الظهر',Asr:'العصر',Maghrib:'المغرب',Isha:'العشاء'};
let prayerTimes=null,notifTimers=[];
async function fetchPrayerTimes(city){
  city=city||load('wird2_city','Cairo');
  try{
    const d=new Date(),dd=String(d.getDate()).padStart(2,'0'),mm=String(d.getMonth()+1).padStart(2,'0'),yy=d.getFullYear();
    const res=await fetch(`https://api.aladhan.com/v1/timingsByCity/${dd}-${mm}-${yy}?city=${encodeURIComponent(city)}&country=&method=5`);
    const json=await res.json();
    if(json.code===200){prayerTimes=json.data.timings;save('wird2_city',city);save('wird2_prayer_cache',{date:TK,city,timings:prayerTimes});renderPrayers(city);scheduleNotifs();}
    else document.getElementById('prayer-bar').innerHTML='<div class="prayer-city">تعذّر تحميل أوقات الصلاة</div>';
  }catch{document.getElementById('prayer-bar').innerHTML='<div class="prayer-city">تعذّر تحميل أوقات الصلاة</div>';}
}
function renderPrayers(city){
  if(!prayerTimes)return;
  const now=new Date(),nowMin=now.getHours()*60+now.getMinutes();
  const keys=['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'];
  const mins=keys.map(k=>{const[h,m]=prayerTimes[k].split(':').map(Number);return h*60+m;});
  let ni=-1;for(let i=0;i<mins.length;i++){if(mins[i]>nowMin){ni=i;break;}}
  const html=keys.map((k,i)=>{const isN=i===ni,diff=mins[i]-nowMin;let nl='';if(isN&&diff>0){const hr=Math.floor(diff/60),mn=diff%60;nl=hr>0?`بعد ${hr}س ${mn}د`:`بعد ${mn} د`;}return `<div class="pt${isN?' active':''}"><span class="pt-name">${PAR[k]}</span><span class="pt-time">${prayerTimes[k].replace(/\s*(AM|PM)/i,'')}</span><div class="pt-dot"></div>${isN?`<span class="pt-next">${nl}</span>`:''}</div>`;}).join('');
  document.getElementById('prayer-bar').innerHTML=`<div class="prayer-times">${html}</div><div class="prayer-city">📍 ${city}</div>`;
}
function scheduleNotifs(){
  if(!prayerTimes||Notification.permission!=='granted')return;
  notifTimers.forEach(clearTimeout);notifTimers=[];
  const now=new Date();
  ['Fajr','Dhuhr','Asr','Maghrib','Isha'].forEach(k=>{const[h,m]=prayerTimes[k].split(':').map(Number),pd=new Date(now);pd.setHours(h,m,0,0);const diff=pd-now;if(diff>0&&diff<86400000){const t=setTimeout(()=>new Notification(`🕌 حان وقت ${PAR[k]}`,{body:'لا تفوّت صلاة الجماعة وأذكار الصلاة'}),diff);notifTimers.push(t);}});
}
function scheduleEODReminder(){if(Notification.permission!=='granted')return;const now=new Date(),target=new Date(now);target.setHours(22,0,0,0);if(target<=now)return;setTimeout(()=>{const pct=Math.round(calcPts()/maxPts()*100);if(pct<100)new Notification('📋 لم تُرسل ورد اليوم بعد!',{body:`أنجزت ${pct}% من الورد`});},target-now);}
async function requestNotif(){
  if(!('Notification'in window)){document.getElementById('notif-status').textContent='متصفحك لا يدعم الإشعارات';return;}
  const perm=await Notification.requestPermission();
  if(perm==='granted'){const nb=document.getElementById('notif-btn');nb.textContent='✅ تذكيرات الأذان مفعّلة';nb.style.background='rgba(255,255,255,0.3)';document.getElementById('notif-status').textContent='ستصلك إشعارات عند كل أذان';scheduleNotifs();scheduleEODReminder();}
  else document.getElementById('notif-status').textContent='لم يتم السماح بالإشعارات';
}
function loadPrayerCache(){const c=load('wird2_prayer_cache',null);if(c&&c.date===TK){prayerTimes=c.timings;renderPrayers(c.city);scheduleNotifs();}else fetchPrayerTimes(load('wird2_city','Cairo'));}

function setActiveSec(sec){activeSec=sec;renderLectures();}

function extractDriveFileId(url){
  const raw=String(url||'').trim();
  if(!raw) return '';
  const match=raw.match(/\/d\/([^\/]+)/) || raw.match(/[?&]id=([^&]+)/);
  return match&&match[1]?match[1]:'';
}
function isGoogleDriveAudio(url){
  return !!extractDriveFileId(url);
}
function resolveLectureAudioUrl(url){
  const raw=String(url||'').trim();
  if(!raw) return '';
  const fileId=extractDriveFileId(raw);
  if(fileId) return `https://drive.google.com/uc?export=download&id=${fileId}`;
  return raw;
}
function resolveLectureEmbedUrl(url){
  const fileId=extractDriveFileId(url);
  return fileId?`https://drive.google.com/file/d/${fileId}/preview`:'';
}
function playLectureAudio(id,url){
  const card=document.getElementById(`lec-card-${id}`);
  if(!card) return;
  const frame=card.querySelector('.drive-frame');
  const audio=card.querySelector('.audio-player');
  if(frame){
    frame.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  if(audio){
    audio.play().catch(()=>alert('تعذّر تشغيل الملف داخل التطبيق. جرّب رابط ملف مباشر أو رابط مشاركة صحيح من Google Drive.'));

  alert('رابط الصوت غير متاح');
}

  const questions=qRaw?qRaw.split('\n').map(s=>s.trim()).filter(Boolean):[];
  const lec={id:'lec_'+Date.now(),title,section,url,date,duration,questions};
  adminLectures.push(lec);
  save('wird_lectures',adminLectures);
  document.getElementById('a-title').value='';

  document.getElementById('a-date').value='';
  document.getElementById('a-dur').value='';
  document.getElementById('a-qs').value='';

}

function deleteLecture(id){
  adminLectures=adminLectures.filter(l=>l.id!==id);

function buildSharePayload(){
  return JSON.stringify(uniqueLectures(adminLectures),null,2);
}

function buildShareLink(){
  const payload=encodeURIComponent(buildSharePayload());
  return `${location.origin}${location.pathname}#lectures=${payload}`;
}

  const code=buildSharePayload();

function applySharedLecturesFromHash(){
  const hash=location.hash||'';
  if(!hash.startsWith('#lectures=')) return;
  const raw=hash.slice('#lectures='.length);
  if(!raw) return;
  try{
    const decoded=decodeURIComponent(raw);
    if(importLecturesFromText(decoded,{silent:true})){
      history.replaceState(null,'',location.pathname+location.search);
    }
  }catch(e){}
}

// reset
function resetDay(){
  const got=calcPts(),mx=maxPts(),entry={date:TK,got,max:mx,label:todayLabel()};
  const ex=history.findIndex(h=>h.date===TK);
  if(ex>=0)history[ex]=entry;else history.unshift(entry);
  if(history.length>7)history=history.slice(0,7);
  save('wird2_history',history);state[TK]={};save('wird2_state',state);save('wird2_comment','');render();
}

function showMotivationalMessage(){
  const box=document.getElementById('motivation-toast');
  const textEl=document.getElementById('motivation-text');
  if(!box||!textEl||!MOTIVATIONAL_MESSAGES.length) return;
  const seed=(new Date()).getDate()+(new Date()).getMonth()*31+(new Date()).getFullYear();
  const msg=MOTIVATIONAL_MESSAGES[seed % MOTIVATIONAL_MESSAGES.length];
  textEl.textContent=msg;
  requestAnimationFrame(()=>box.classList.add('show'));
  setTimeout(()=>box.classList.remove('show'),4200);
}
