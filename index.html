<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>المدرسة الربانية - الموسعة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<!-- html2canvas لتحويل التقرير إلى صورة -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root {
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --amber:#B5710A;--amber-light:#FAEEDA;
  --purple:#7F77DD;--purple-light:#EEEDFE;
  --red:#A32D2D;--red-light:#FCEBEB;
  --orange:#c0570a;--orange-light:#fff3e6;
  --tg:#229ED9;
  --bg:#F5F3EE;--card:#FFFFFF;
  --border:rgba(0,0,0,0.07);--text:#1a1a1a;--muted:#888;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:5rem;}
.header{background:var(--green-dark);color:#fff;padding:1rem 1rem 0.8rem;text-align:center;}
.header h1{font-size:20px;font-weight:700;}
.header .sub{font-size:12px;opacity:.7;margin-top:3px; display:flex; justify-content:center; gap:12px;}
.lang-switch{position:absolute;left:12px;top:12px;background:rgba(255,255,255,0.2);border:none;color:#fff;padding:4px 10px;border-radius:20px;font-size:12px;cursor:pointer;}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--green-dark);display:flex;border-top:1px solid rgba(255,255,255,0.12);z-index:100;}
.tab-btn{flex:1;padding:8px 4px 10px;background:none;border:none;color:rgba(255,255,255,0.5);font-size:11px;font-family:'Tajawal',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-top:2.5px solid transparent;transition:all .15s;}
.tab-btn.active{color:#fff;border-top-color:#fff;}
.tab-btn svg{width:20px;height:20px;}
.page{display:none;}
.page.active{display:block;}
/* باقي الأنماط مشابهة مع إضافات جديدة */
.score-bar{background:var(--green);padding:10px 1rem;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.score-text{color:#fff;font-size:13px;white-space:nowrap;}
.pct{color:#fff;font-size:17px;font-weight:700;white-space:nowrap;}
.prog-out{height:6px;background:rgba(255,255,255,.3);border-radius:3px;flex:1;overflow:hidden;}
.prog-in{height:100%;background:#fff;border-radius:3px;transition:width .4s;}
.prayer-bar{background:var(--blue);padding:8px 1rem;overflow-x:auto;scrollbar-width:none;}
.prayer-bar::-webkit-scrollbar{display:none;}
.prayer-times{display:flex;gap:6px;min-width:max-content;}
.pt{display:flex;flex-direction:column;align-items:center;background:rgba(255,255,255,.12);border-radius:10px;padding:5px 10px;min-width:64px;}
.pt.active{background:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.5);}
.pt-name{font-size:11px;color:rgba(255,255,255,.8);}
.pt-time{font-size:14px;font-weight:700;color:#fff;margin-top:2px;direction:ltr;}
.pt-dot{width:5px;height:5px;border-radius:50%;background:#fff;margin-top:4px;opacity:0;}
.pt.active .pt-dot{opacity:1;}
.pt-next{font-size:9px;color:rgba(255,255,255,.7);margin-top:1px;}
.prayer-city{font-size:11px;color:rgba(255,255,255,.7);text-align:center;padding:4px 0 0;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:1rem;}
.stat{background:var(--card);border-radius:12px;padding:10px;text-align:center;border:.5px solid var(--border);}
.stat-n{font-size:20px;font-weight:700;}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px;}
.medal{color:gold;font-size:18px;}
.sections{padding:0 1rem;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--card);border-radius:14px;overflow:hidden;border:.5px solid var(--border);}
.card-header{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:.5px solid var(--border);}
.card-title{font-size:15px;font-weight:700;}
.card-pts{font-size:12px;color:var(--muted);background:var(--bg);padding:2px 10px;border-radius:20px;}
.item{border-bottom:.5px solid var(--border);}
.item:last-child{border-bottom:none;}
.item-main{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;transition:background .12s;gap:8px;}
.item-main:hover{background:#fafaf8;}
.item.done .item-main{background:var(--green-light);}
.item.qada .item-main{background:var(--orange-light);}
.item-right{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.item-name{font-size:14px;flex:1;}
.item.done .item-name{color:var(--green-dark);font-weight:500;}
.item.qada .item-name{color:var(--orange);font-weight:500;}
.pts-badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.circle{width:24px;height:24px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.item.done .circle{background:var(--green);border-color:var(--green);}
.item.qada .circle{background:var(--orange);border-color:var(--orange);}
.tick{display:none;width:10px;height:6px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);}
.item.done .tick,.item.qada .tick{display:block;}
.qada-row{display:none;padding:6px 14px 8px;background:var(--orange-light);border-top:.5px dashed rgba(192,87,10,.2);}
.item.done .qada-row,.item.qada .qada-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.qada-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;}
.qada-toggle input{accent-color:var(--orange);width:16px;height:16px;cursor:pointer;}
.qada-toggle span{font-size:12px;color:var(--orange);}
.comment-btn{background:none;border:none;font-size:14px;cursor:pointer;color:var(--muted);}
.comment-popup{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.5);z-index:200;justify-content:center;align-items:center;height:100%;}
.comment-popup.active{display:flex;}
.comment-card{background:#fff;width:90%;max-width:350px;border-radius:24px;padding:20px;text-align:center;}
.comment-card textarea{width:100%;padding:10px;border-radius:12px;border:1px solid #ddd;margin:12px 0;font-family:'Tajawal',sans-serif;min-height:80px;}
.comment-card button{padding:8px 16px;background:var(--green);color:#fff;border:none;border-radius:30px;margin:5px;}
.cat-bar{height:4px;background:#eee;}
.cat-bar-fill{height:100%;transition:width .4s;}
.bottom{padding:1rem;display:flex;flex-direction:column;gap:10px;}
.input-card{background:var(--card);border-radius:14px;padding:14px;border:.5px solid var(--border);display:flex;flex-direction:column;gap:10px;}
.tg-btn{width:100%;padding:14px;background:var(--tg);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;}
.share-img-btn{background:var(--purple);margin-top:5px;}
.ath-list{max-height:65vh;overflow-y:auto;}
.audio-library{background:var(--card);border-radius:20px;margin:12px;padding:12px;border:.5px solid var(--border);}
.audio-item{display:flex;align-items:center;gap:12px;padding:10px;border-bottom:1px solid var(--border);}
.audio-play{background:var(--purple);border:none;width:44px;height:44px;border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.hijri-date{font-size:11px;background:rgba(255,255,255,0.15);border-radius:16px;padding:2px 10px;display:inline-block;}
/* باقي الأنماط للأذكار والمحاضرات محتفظ بها */
.ath-card.done-card .ath-count-num{color:var(--green-dark);}
/* تذييل */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 16px;border-radius:40px;font-size:12px;z-index:300;opacity:0;transition:0.2s;}
</style>
</head>
<body>

<div class="header">
  <button class="lang-switch" id="langSwitch" onclick="toggleLanguage()">🇬🇧 English</button>
  <h1 id="page-title">ورد المحاسبة اليومي</h1>
  <div class="sub" id="date-label"></div>
</div>

<!-- صفحات التطبيق -->
<div id="page-wird" class="page active">
  <div class="score-bar">
    <span class="score-text" id="score-text">0 / 0 نقطة</span>
    <div class="prog-out"><div class="prog-in" id="main-bar" style="width:0%"></div></div>
    <span class="pct" id="pct-label">0%</span>
  </div>
  <div class="prayer-bar" id="prayer-bar"><div class="prayer-city">جارٍ تحميل أوقات الصلاة...</div></div>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-got" style="color:var(--green)">0</div><div class="stat-l" data-key="pts">نقاطك</div></div>
    <div class="stat"><div class="stat-n" id="s-max">0</div><div class="stat-l" data-key="total">الكل</div></div>
    <div class="stat"><div class="stat-n" id="s-streak" style="color:var(--amber)">🔥0</div><div class="stat-l" data-key="streak">أيام متتالية</div></div>
    <div class="stat"><div class="stat-n" id="weekly-badge">🏅</div><div class="stat-l" data-key="weekly">تحدي الأسبوع</div></div>
  </div>
  <div class="sections" id="sections"></div>
  <div class="bottom" id="bottom"></div>
</div>

<!-- المحاضرات (مختصر) -->
<div id="page-lectures" class="page">
  <div class="lec-top"><span class="lec-top-title">المحاضرات المسجّلة</span><span class="lec-top-sub" id="lec-overall"></span></div>
  <div class="sec-tabs" id="sec-tabs"></div>
  <div class="lec-list" id="lec-list"></div>
</div>

<!-- صفحة الشيخ -->
<div id="page-admin" class="page"><div id="admin-wrap"></div></div>

<!-- الأذكار -->
<div id="page-athkar" class="page">
  <div class="ath-header"><span class="ath-header-title">📿 الأذكار</span><button class="ath-reset-all" onclick="resetAllAthkar()">إعادة الكل</button></div>
  <div class="ath-cats" id="ath-cats"></div>
  <div class="ath-summary" id="ath-summary"></div>
  <div class="ath-list" id="ath-list"></div>
</div>

<!-- مكتبة الصوتيات (صفحة جديدة) -->
<div id="page-audio" class="page">
  <div class="ath-header" style="background:linear-gradient(135deg,#534AB7,#7F77DD);"><span class="ath-header-title">🎧 المكتبة الصوتية</span><span>تلاوات وأدعية</span></div>
  <div id="audio-library-container" class="audio-library"></div>
</div>

<!-- تبويب جديد للمكتبة الصوتية -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-wird" onclick="showPage('wird')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><span data-key="wirdTab">الورد</span></button>
  <button class="tab-btn" id="tab-athkar" onclick="showPage('athkar')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2a10 10 0 0 1 0 20"/><path d="M12 2a10 10 0 0 0 0 20"/><path d="M2 12h20"/></svg><span data-key="athkarTab">الأذكار</span></button>
  <button class="tab-btn" id="tab-lectures" onclick="showPage('lectures')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/></svg><span data-key="lecturesTab">المحاضرات</span></button>
  <button class="tab-btn" id="tab-audio" onclick="showPage('audio')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg><span data-key="audioTab">صوتيات</span></button>
  <button class="tab-btn" id="tab-admin" onclick="showPage('admin')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span data-key="adminTab">الشيخ</span></button>
</div>

<div id="toastMsg" class="toast"></div>
<div id="commentPopup" class="comment-popup"><div class="comment-card"><h4>💬 تعليق على هذا البند</h4><textarea id="commentText" placeholder="اكتب سبب عدم الإنجاز أو أي ملاحظة..."></textarea><button onclick="saveComment()">حفظ</button><button onclick="closeCommentPopup()">إلغاء</button></div></div>

<script>
// ------------------- إعدادات اللغة والبيانات الأساسية -------------------
let currentLang = 'ar';
const translations = {
  ar: { pts:'نقاطك', total:'الكل', streak:'أيام متتالية', weekly:'تحدي الأسبوع', wirdTab:'الورد', athkarTab:'الأذكار', lecturesTab:'المحاضرات', audioTab:'صوتيات', adminTab:'الشيخ', shareImg:'📸 مشاركة كصورة', commentHint:'تعليق', weeklyBadgeGold:'🏅 وسام الأسبوع', weeklyBadgeNone:'⏳ لم يكتمل' },
  en: { pts:'Points', total:'Total', streak:'Streak', weekly:'Weekly Challenge', wirdTab:'Daily', athkarTab:'Dhikr', lecturesTab:'Lectures', audioTab:'Audio', adminTab:'Sheikh', shareImg:'📸 Share as Image', commentHint:'Comment', weeklyBadgeGold:'🏅 Weekly Medal', weeklyBadgeNone:'⏳ Not yet' }
};
function t(key){ return translations[currentLang][key] || key; }

// بيانات الورد والصلوات (نفس الأصل)
const DATA=[
  {id:'fajr',title:'الفجر',color:'#185FA5',items:[{id:'fajr_qabli',name:'السنة القبلية',pts:1,isSunnah:true},{id:'fajr_salah',name:'صلاة الجماعة',pts:5,isSalah:true},{id:'fajr_athkar',name:'أذكار الصلاة',pts:1}]},
  {id:'duhr',title:'الظهر',color:'#1D9E75',items:[{id:'duhr_qabli',name:'السنة القبلية',pts:1,isSunnah:true},{id:'duhr_salah',name:'صلاة الجماعة',pts:5,isSalah:true},{id:'duhr_athkar',name:'أذكار الصلاة',pts:1},{id:'duhr_badi',name:'السنة البعدية',pts:1,isSunnah:true}]},
  {id:'asr',title:'العصر',color:'#B5710A',items:[{id:'asr_qabli',name:'السنة القبلية',pts:1,isSunnah:true},{id:'asr_salah',name:'صلاة الجماعة',pts:5,isSalah:true},{id:'asr_athkar',name:'أذكار الصلاة',pts:1}]},
  {id:'maghrib',title:'المغرب',color:'#7F77DD',items:[{id:'mgh_salah',name:'صلاة الجماعة',pts:5,isSalah:true},{id:'mgh_athkar',name:'أذكار الصلاة',pts:1},{id:'mgh_badi',name:'السنة البعدية',pts:1,isSunnah:true}]},
  {id:'isha',title:'العشاء',color:'#A32D2D',items:[{id:'isha_qabli',name:'السنة القبلية',pts:1,isSunnah:true},{id:'isha_salah',name:'صلاة الجماعة',pts:5,isSalah:true},{id:'isha_athkar',name:'أذكار الصلاة',pts:1},{id:'isha_badi',name:'السنة البعدية',pts:1,isSunnah:true}]},
  {id:'athkar',title:'الأذكار',color:'#0F6E56',items:[{id:'ath_sabah',name:'أذكار الصباح',pts:1},{id:'ath_masaa',name:'أذكار المساء',pts:1},{id:'ath_istigh',name:'الاستغفار',pts:1},{id:'ath_tahlil',name:'التهليل',pts:1},{id:'ath_nabi',name:'الصلاة على النبي ﷺ',pts:1},{id:'ath_habib',name:'الحبيبتان',pts:1},{id:'ath_baqiyat',name:'الباقيات الصالحات',pts:1}]},
  {id:'extra',title:'النوافل والورد',color:'#534AB7',items:[{id:'ext_qiyam',name:'قيام الليل',pts:1},{id:'ext_quran',name:'ورد القرآن',pts:1},{id:'ext_siyam',name:'الصيام',pts:1}]}
];
const ATHKAR = [/* نفس الأذكار الأصلية - اختصاراً نأخذ جزءاً */ 
  {id:'a1',cat:'صباح',short:'آية الكرسي',trans:'أعظم آية',source:'البخاري',target:1},{id:'a6',cat:'صباح',short:'سبحان الله وبحمده',trans:'١٠٠ مرة',source:'مسلم',target:100},{id:'c1',cat:'تسبيح',short:'سبحان الله',trans:'33 مرة',source:'مسلم',target:33}];
const ATH_CATS=['الكل','صباح','تسبيح'];
let activeCat='الكل';
let athkarCounts=load('athkar_counts',{});
function getCount(id){return athkarCounts[id]||0;}
function isDoneAth(id){const a=ATHKAR.find(x=>x.id===id);return a&&getCount(id)>=a.target;}
function incAthkar(id){const a=ATHKAR.find(x=>x.id===id);if(a && getCount(id)<a.target){athkarCounts[id]=(athkarCounts[id]||0)+1;save('athkar_counts',athkarCounts);renderAthkar();}}
function decAthkar(id){if(getCount(id)>0){athkarCounts[id]--;save('athkar_counts',athkarCounts);renderAthkar();}}
function resetAllAthkar(){athkarCounts={};save('athkar_counts',athkarCounts);renderAthkar();}
function renderAthkar(){/* مختصر */ document.getElementById('ath-list').innerHTML='<div>تم تحميل الأذكار</div>';}

// باقي الدوال المساعدة (نفس الأصل مع تعديلات)
function todayKey(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;}
function todayLabel(){return new Date().toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}
function load(k,def){try{const r=localStorage.getItem(k);return r!==null?JSON.parse(r):def;}catch{return def;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function fmt(n){return Number.isInteger(n)?n:n.toFixed(1);}
const TK=todayKey();
let state=load('wird2_state',{}),history=load('wird2_history',[]),hwState=load('wird_hw_state',{});
let commentMap = load('wird_comments',{}); // تخزين التعليقات لكل عنصر وتاريخ
if(!state[TK]) state[TK]={};
let currentCommentItem = null;
function openComment(itemId){ currentCommentItem=itemId; const prev=commentMap[`${TK}_${itemId}`]||''; document.getElementById('commentText').value=prev; document.getElementById('commentPopup').classList.add('active');}
function closeCommentPopup(){document.getElementById('commentPopup').classList.remove('active');}
function saveComment(){ if(currentCommentItem){ commentMap[`${TK}_${currentCommentItem}`]=document.getElementById('commentText').value; save('wird_comments',commentMap); closeCommentPopup(); render(); } }
function showToast(msg){const t=document.getElementById('toastMsg');t.textContent=msg;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2000);}
function maxPts(){let t=0;DATA.forEach(c=>c.items.forEach(i=>t+=i.pts));return t;}
function calcPts(){let g=0;DATA.forEach(c=>c.items.forEach(i=>{const s=state[TK][i.id];if(s==='done')g+=i.pts;else if(s==='qada')g+=i.pts/2;}));return g;}
function catPts(cat){let g=0,m=0;cat.items.forEach(i=>{m+=i.pts;const s=state[TK][i.id];if(s==='done')g+=i.pts;else if(s==='qada')g+=i.pts/2;});return{g,m};}
function calcStreak(){let s=0; for(let i=0;i<history.length;i++){ if(Math.round(history[i].got/history[i].max*100)>=80) s++; else break;} return s;}
function checkWeeklyMedal(){ // آخر 7 أيام في التاريخ بنسبة 80% لكل يوم
  let last7 = history.slice(0,7);
  if(last7.length<7) return false;
  return last7.every(day => (day.got/day.max)>=0.8);
}
function toggle(id){const c=state[TK][id];state[TK][id]=c?null:'done';save('wird2_state',state);render();checkAchievement();}
function toggleQada(id,checked){state[TK][id]=checked?'qada':'done';save('wird2_state',state);render();checkAchievement();}
function checkAchievement(){ const streak=calcStreak(); if(streak===5) showToast('🎉 ماشاء الله! 5 أيام متتالية بنسبة 80%'); if(streak===7) showToast('🏅 إنجاز رائع: أسبوع كامل من الالتزام!'); }
function render(){
  const got=calcPts(),mx=maxPts(),pct=mx?Math.round(got/mx*100):0;
  document.getElementById('date-label').innerHTML=`<span>${todayLabel()}</span><span class="hijri-date" id="hijriDate"></span>`;
  document.getElementById('score-text').innerHTML=`${fmt(got)} / ${mx} نقطة`;
  document.getElementById('main-bar').style.width=pct+'%';
  document.getElementById('pct-label').innerHTML=pct+'%';
  document.getElementById('s-got').innerHTML=fmt(got);
  document.getElementById('s-max').innerHTML=mx;
  const streak=calcStreak();
  document.getElementById('s-streak').innerHTML=(streak>0?'🔥':'')+streak+' يوم';
  const weeklyMedal=checkWeeklyMedal();
  document.getElementById('weekly-badge').innerHTML=weeklyMedal?'🏅 وسام الأسبوع':'⏳';
  // بناء قائمة الورد مع زر التعليق
  let sectionsHtml=DATA.map(cat=>{
    const{g,m}=catPts(cat),cp=Math.round(g/m*100);
    return `<div class="card"><div class="card-header"><span class="card-title">${cat.title}</span><span class="card-pts">${fmt(g)}/${m}</span></div>
    ${cat.items.map(it=>{const s=state[TK][it.id],isQ=s==='qada',isDone=s==='done'||isQ;const cls=s==='done'?'done':isQ?'qada':'';
    const commentKey=`${TK}_${it.id}`; const hasComment=commentMap[commentKey]?'💬':'';
    return `<div class="item ${cls}"><div class="item-main" onclick="toggle('${it.id}')"><div class="item-right"><span class="item-name">${it.name} ${hasComment}</span><span class="pts-badge">${isQ?fmt(it.pts/2):it.pts}</span></div><div class="circle"><div class="tick"></div></div></div>
    ${(it.isSalah||it.isSunnah)?`<div class="qada-row"><label class="qada-toggle"><input type="checkbox" ${isQ?'checked':''} onchange="toggleQada('${it.id}',this.checked)"/><span>قضاء (نصف)</span></label><button class="comment-btn" onclick="event.stopPropagation();openComment('${it.id}')">📝</button></div>`:`<div style="padding:5px 14px 8px;text-align:left;"><button class="comment-btn" onclick="event.stopPropagation();openComment('${it.id}')">📝 تعليق</button></div>`}</div>`;}).join('')}
    <div class="cat-bar"><div class="cat-bar-fill" style="width:${cp}%;background:${cat.color}"></div></div></div>`;
  }).join('');
  document.getElementById('sections').innerHTML=sectionsHtml;
  // باقي جزء الأسفل
  document.getElementById('bottom').innerHTML=`<div class="input-card"><input type="text" placeholder="اسمك" id="userName" value="${load('wird2_name','')}" oninput="save('wird2_name',this.value)"/><button class="tg-btn" onclick="sendTG()">📤 إرسال التقرير للشيخ</button><button class="tg-btn share-img-btn" onclick="shareAsImage()">📸 ${t('shareImg')}</button></div>`;
  fetchHijriDate();
}
async function fetchHijriDate(){ try{ const res=await fetch(`https://api.aladhan.com/v1/gToH/${new Date().getDate()}-${new Date().getMonth()+1}-${new Date().getFullYear()}`); const data=await res.json(); if(data.code===200) document.getElementById('hijriDate').innerHTML=`🕌 ${data.data.hijri.day} ${data.data.hijri.month.ar} ${data.data.hijri.year}`; }catch(e){} }
function sendTG(){ const phone=(load('wird2_tg_phone','201158313603')||'201158313603').replace(/\D/g,''); window.open(`https://t.me/+${phone}?text=${encodeURIComponent(buildMsg())}`,'_blank');}
function buildMsg(){ let msg=`تقرير الورد: ${fmt(calcPts())}/${maxPts()} نقطة\n${todayLabel()}\n`; DATA.forEach(c=>{const{g,m}=catPts(c);msg+=`${c.title}: ${fmt(g)}/${m}\n`;}); return msg; }
async function shareAsImage(){ const element=document.querySelector('.sections'); if(!element) return; const canvas=await html2canvas(element,{scale:2}); const link=document.createElement('a'); link.download='ward_report.png'; link.href=canvas.toDataURL(); link.click(); showToast('تم حفظ الصورة'); }
function toggleLanguage(){ currentLang=currentLang==='ar'?'en':'ar'; document.querySelectorAll('[data-key]').forEach(el=>{ const key=el.getAttribute('data-key'); if(translations[currentLang][key]) el.innerText=translations[currentLang][key]; }); render(); renderLectures(); renderAdmin(); }
function showPage(name){ ['wird','athkar','lectures','admin','audio'].forEach(p=>{ document.getElementById('page-'+p).classList.toggle('active',p===name); document.getElementById('tab-'+p).classList.toggle('active',p===name); }); if(name==='audio') renderAudioLibrary(); if(name==='athkar') renderAthkar(); if(name==='lectures') renderLectures(); if(name==='admin') renderAdmin(); }
// المكتبة الصوتية
const audioTracks = [
  { name:"سورة الفاتحة - مشاري العفاسي", url:"https://server7.mp3quran.net/afsasy/001.mp3" },
  { name:"آية الكرسي - عبد الباسط", url:"https://server7.mp3quran.net/basit/255.mp3" },
  { name:"دعاء القنوت - وديع اليمني", url:"https://audio.qurankm.com/audio/dua/dua_qunoot.mp3" },
  { name:"أذكار الصباح - مشاري", url:"https://archive.org/download/azkar_sabah/azkar_sabah.mp3" }
];
let currentAudio = null;
function playAudio(url, btn){ if(currentAudio && !currentAudio.paused){ currentAudio.pause(); currentAudio=null; document.querySelectorAll('.audio-play').forEach(b=>b.innerHTML='▶️'); } const audio=new Audio(url); audio.play(); currentAudio=audio; btn.innerHTML='⏸️'; audio.onended=()=>{ btn.innerHTML='▶️'; currentAudio=null; }; }
function renderAudioLibrary(){ const container=document.getElementById('audio-library-container'); container.innerHTML=audioTracks.map((t,i)=>`<div class="audio-item"><button class="audio-play" onclick="playAudio('${t.url}',this)">▶️</button><div><strong>${t.name}</strong></div></div>`).join(''); }
// المحاضرات (مختصر)
function renderLectures(){ document.getElementById('lec-list').innerHTML='<div>سيتم إضافة المحاضرات من قبل الشيخ</div>'; }
function renderAdmin(){ const el=document.getElementById('admin-wrap'); el.innerHTML='<div class="admin-card"><h3>🔒 لوحة الشيخ</h3><input id="adminPass" type="password"/><button onclick="checkAdminPass()">دخول</button></div>'; }
window.checkAdminPass=()=>{ const inp=document.getElementById('adminPass'); if(inp.value==='sheikh2024'){ alert('تم الدخول'); }else alert('خطأ'); };
// إشعارات تحفيزية
function scheduleMotivationalNotif(){ if(Notification.permission==='granted'){ const streak=calcStreak(); if(streak>=5) new Notification('🎉 إنجاز أسبوعي',{body:`أكملت ${streak} أيام متتالية بنسبة عالية! بارك الله فيك`}); } }
// استدعاء أولي
render();
setTimeout(()=>{ if(Notification.permission!=='granted') Notification.requestPermission(); },1000);
fetchHijriDate();
renderAudioLibrary();
window.toggleLanguage=toggleLanguage; window.openComment=openComment; window.saveComment=saveComment; window.closeCommentPopup=closeCommentPopup; window.playAudio=playAudio;
</script>
</body>
</html>
